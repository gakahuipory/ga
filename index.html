<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖途論戰 Graph Rivals</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div id="game-container">
        <h1>圖途論戰 Graph Rivals</h1>
        <div id="login-section">
            <!-- 已移除副標題 -->
            <div>
                <label>房間號碼 (3-7位數字)：</label>
                <input type="text" id="room-input" placeholder="例如: 1234567" pattern="\d{3,7}" title="請輸入3到7位數字">
                <button id="create-btn">建立房間</button>
                <button id="join-btn">加入房間</button>
            </div>
            <div id="player-id-info"></div>
            <div id="room-error-message" style="color: red; margin-top: 10px;"></div>
        </div>

        <!-- 等待房間 -->
        <div id="waiting-room" style="display: none;">
            <div id="waiting-header">
                房間號: <span id="waiting-room-number"></span>
                <button id="waiting-exit-btn">退出房間</button>
            </div>
            <h2>等待玩家加入⋯</h2>
            <!-- 裁判資訊（僅派對模式顯示） -->
            <div id="referee-info" style="display: none; background: #34495e; color: white; padding: 8px; border-radius: 20px; margin-bottom: 10px;">
                👨‍⚖️ 裁判：房主
            </div>
            <div id="player-list">
                <div class="player-waiting" id="waiting-player1">藍隊 <span class="waiting-status" id="player1-status">❌</span></div>
                <div class="player-waiting" id="waiting-player2">紅隊 <span class="waiting-status" id="player2-status">❌</span></div>
                <div class="player-waiting" id="waiting-player3">綠隊 <span class="waiting-status" id="player3-status">❌</span></div>
                <div class="player-waiting" id="waiting-player4">紫隊 <span class="waiting-status" id="player4-status">❌</span></div>
                <div class="player-waiting" id="waiting-player5" style="display: none;">藍隊 <span class="waiting-status" id="player5-status">❌</span></div>
            </div>
            <div id="waiting-start-area">
                <button id="start-game-btn" style="display: none;">開始遊戲</button>
                <!-- 模式選擇（僅房主可見） -->
                <div id="mode-selection" style="display: none; margin-top: 15px;">
                    <label style="color: #2c3e50;">遊戲模式：</label>
                    <select id="game-mode-select">
                        <option value="normal">一般模式</option>
                        <option value="party">派對模式</option>
                    </select>
                </div>
                <!-- 規則按鈕（所有人都可見） -->
                <div style="margin-top: 15px;">
                    <button id="rules-btn-waiting" class="rules-btn">📖 遊戲規則</button>
                </div>
            </div>
            <p id="waiting-hint">等待房主開始遊戲⋯</p>
        </div>

        <!-- 遊戲主畫面 -->
        <div id="game-play-section" style="display: none;">
            <div id="room-info-line">
                房間號: <span id="display-room-number"></span> | <span id="room-status">等待隊伍加入...</span>
                <span id="current-player-label" style="margin-left: 10px; font-weight: bold;"></span>
                <button id="exit-room-btn">退出房間</button>
            </div>

            <div id="game-header">
                <div id="turn-indicator">等待開始</div>
                <div id="dice-area" style="display: none;">
                    <span>🎲 骰子:</span>
                    <span id="dice1" class="dice">0</span>
                    <span id="dice2" class="dice">0</span>
                    <span id="dice3" class="dice">0</span>
                    <span> 總和: <span id="dice-sum">0</span></span>
                    <button id="roll-dice-btn" disabled>擲骰(回合自動)</button>
                </div>
                <!-- 技能卡區域（裁判模式下會隱藏） -->
                <div id="skill-area" style="opacity: 0.5; pointer-events: none;">
                    <div class="skill-card">🔁 換線 (0)</div>
                    <div class="skill-card">🎲 重骰 (0)</div>
                    <div class="skill-card">✨ 特殊 (0)</div>
                </div>
                <!-- 裁判專用返回按鈕 -->
                <div id="referee-actions" style="display: none;">
                    <button id="undo-btn" class="undo-button">↩️ 返回上一步</button>
                </div>
            </div>

            <!-- 四位玩家資訊 -->
            <div id="players-info">
                <div id="player1-info" class="player-info"><span class="team-name">藍隊</span> <span class="player-start" id="p1-start"></span></div>
                <div id="player2-info" class="player-info"><span class="team-name">紅隊</span> <span class="player-start" id="p2-start"></span></div>
                <div id="player3-info" class="player-info"><span class="team-name">綠隊</span> <span class="player-start" id="p3-start"></span></div>
                <div id="player4-info" class="player-info"><span class="team-name">紫隊</span> <span class="player-start" id="p4-start"></span></div>
                <div id="player5-info" class="player-info" style="display: none;"><span class="team-name">藍隊</span> <span class="player-start" id="p5-start"></span></div>
            </div>

            <div id="map-container">
                <canvas id="game-canvas" width="900" height="650"></canvas>
            </div>

            <div id="control-panel">
                <!-- 起點選擇區 -->
                <div id="start-point-selection" style="display: none;">
                    <p>請選擇你的起點 (A~M)</p>
                    <div class="node-buttons">
                        <!-- 動態生成 A~M 按鈕 -->
                    </div>
                </div>

                <!-- 邊選擇區 -->
                <div id="edge-selection" style="display: none;">
                    <p>請選擇要佔領的邊：</p>
                    <div id="edge-buttons-container" class="edge-buttons">
                        <!-- 動態生成可佔邊按鈕 -->
                    </div>
                </div>

                <!-- 弱勢方申請區 -->
                <div id="weak-player-section" style="display: none;">
                    <p>你已無邊可佔，成為弱勢方。可向相鄰的強勢方申請佔邊：</p>
                    <div id="claim-buttons-container" class="edge-buttons">
                        <!-- 動態生成可申請的邊 -->
                    </div>
                    <p id="claim-info"></p>
                </div>

                <!-- 裁判顯示上一個行動的區域 -->
                <div id="last-action-display" style="display: none; margin: 15px 0; padding: 12px; background: #2c3e50; color: white; border-radius: 20px; text-align: center; font-size: 1.1rem;">
                    上一個行動：<span id="last-action-text">無</span>
                </div>

                <div id="game-status"></div>
                <button id="reset-game-btn" style="display: none;">重新開始</button>
            </div>
        </div>

        <!-- 結算頁面 -->
        <div id="result-section" style="display: none;">
            <h2>遊戲結束！</h2>
            <div id="result-players-info">
                <!-- 顯示各隊伍總分、邊數 -->
            </div>
            <div id="result-graph-area">
                <p>你的佔邊圖形：</p>
                <canvas id="result-canvas" width="900" height="650"></canvas>
            </div>
            <!-- 邊成本列表（派對模式用） -->
            <div id="edge-cost-list-container" style="margin-top: 20px; padding: 15px; background: #ecf0f1; border-radius: 30px;">
                <h3 style="text-align: center; margin-bottom: 10px;">📋 邊成本列表</h3>
                <div id="edge-cost-list" class="edge-cost-grid"></div>
            </div>
            <div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px;">
                <button id="play-again-btn" class="play-again-btn">🔄 再玩一次</button>
                <button id="back-to-lobby-btn">返回大廳</button>
            </div>
        </div>
    </div>

    <!-- 自訂 JavaScript -->
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
    <!-- 連線檢測與規則按鈕事件 -->
    <script>
        // 等待房間規則按鈕（新開視窗）
        const rulesBtnWaiting = document.getElementById('rules-btn-waiting');
        if (rulesBtnWaiting) {
            rulesBtnWaiting.addEventListener('click', () => {
                window.open('rules.html', '_blank', 'width=800,height=600,toolbar=no,menubar=no,scrollbars=yes');
            });
        }

        // 原有的 Firebase 連線檢測
        setTimeout(() => {
            try {
                if (typeof firebase === 'undefined') {
                    console.error('❌ Firebase SDK 未載入！');
                } else if (!firebase.apps.length) {
                    console.error('❌ Firebase 未初始化！請檢查 firebase-config.js');
                } else {
                    console.log('✅ Firebase 初始化成功');
                    firebase.database().ref('connection_test').set({ timestamp: Date.now() })
                        .then(() => console.log('✅ 資料庫寫入成功'))
                        .catch(err => console.error('❌ 資料庫寫入失敗：', err));
                }
            } catch (e) {
                console.error('❌ 檢測例外：', e);
            }
        }, 500);
    </script>
</body>
</html>
