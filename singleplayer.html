<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖途論戰 - 四人輪流模式</title>
    <link rel="stylesheet" href="singleplayer.css">
</head>
<body>
    <div id="game-container">
        <h1>🎲 四人輪流模式（熱座）</h1>
        <div id="control-bar">
            <button id="reset-game-btn">🔄 重啟遊戲</button>
            <button id="back-to-menu-btn">🏠 返回主選單</button>
        </div>
        <div id="players-info">
            <div class="player-card" id="player1-card">
                <div class="player-name">藍隊</div>
                <div class="player-stats">邊數: <span id="p1-edges">0</span> | 成本: <span id="p1-cost">0</span></div>
                <div class="player-start">起點: <span id="p1-start">-</span></div>
            </div>
            <div class="player-card" id="player2-card">
                <div class="player-name">紅隊</div>
                <div class="player-stats">邊數: <span id="p2-edges">0</span> | 成本: <span id="p2-cost">0</span></div>
                <div class="player-start">起點: <span id="p2-start">-</span></div>
            </div>
            <div class="player-card" id="player3-card">
                <div class="player-name">綠隊</div>
                <div class="player-stats">邊數: <span id="p3-edges">0</span> | 成本: <span id="p3-cost">0</span></div>
                <div class="player-start">起點: <span id="p3-start">-</span></div>
            </div>
            <div class="player-card" id="player4-card">
                <div class="player-name">紫隊</div>
                <div class="player-stats">邊數: <span id="p4-edges">0</span> | 成本: <span id="p4-cost">0</span></div>
                <div class="player-start">起點: <span id="p4-start">-</span></div>
            </div>
        </div>
        <div id="turn-indicator">當前回合：藍隊</div>
        <div id="map-container">
            <canvas id="game-canvas" width="900" height="650"></canvas>
        </div>
        <div id="control-panel">
            <div id="start-point-selection">
                <p>請選擇起點 (A~M)：</p>
                <div class="node-buttons" id="node-buttons"></div>
            </div>
            <div id="edge-selection">
                <p>請選擇要佔領的邊：</p>
                <div id="edge-buttons-container" class="edge-buttons"></div>
            </div>
            <div id="game-status"></div>
            <button id="end-turn-btn" style="display: none;">結束回合（手動）</button>
        </div>
    </div>
    <script src="singleplayer.js"></script>
</body>
</html>
